    message_fr: Acteur critique identifié, mais fonction métier menacée non formulée.
  - id: alternative_not_tested
    severity: 4
    message_fr: Alternative déclarée mais non testée en conditions réelles.
  - id: alternative_not_contractualized
    severity: 4
    message_fr: Alternative identifiée mais non contractualisée.
  - id: tier2_unknown
    severity: 4
