questions:
  - id: case_business_function_at_risk
    block_id: case_framing
    order: 10
    required: true
    type: free_text
    text_fr: Quelle fonction métier cet acteur rend-il possible ou protège-t-il ?
    intent_fr: Vérifier que le cas ne porte pas seulement sur un fournisseur, mais sur une fonction critique.
    targets:
      dimensions:
        - id: flow_criticality_score
          weight: 0.6
      patterns:
        - id: critical_flow_dependency
          weight: 0.6

  - id: critical_actor_replaceability_30d
    block_id: critical_actor
    order: 20
    required: true
    type: categorical
    text_fr: Cet acteur est-il remplaçable en moins de 30 jours sans rupture opérationnelle ?
    answer_options: [yes, probably_yes, uncertain, probably_no, no, not_applicable]
    targets:
      dimensions:
        - id: supplier_dependency_score
          weight: 0.8
        - id: substitution_weakness_score
          weight: 1.0
      patterns:
        - id: visible_supplier_dependency
          weight: 0.7
        - id: substitution_capacity_overestimated
          weight: 0.9
    followups:
      - trigger: answer_in:yes,probably_yes/evidence_quality_lte:2
        question_id: substitution_real_test_proof

  - id: dependency_breaks_first
    block_id: dependency_type
    order: 30
    required: true
    type: categorical
    text_fr: Si cet acteur devient indisponible, qu’est-ce qui casse en premier ?
    answer_options: [production, delivery, compliance, financing, customer_relationship, technology_access, unknown]
    targets:
      dimensions:
        - id: flow_criticality_score
          weight: 1.0
        - id: hidden_dependency_score
          weight: 0.4

  - id: critical_flow_type
    block_id: critical_flow
    order: 40
    required: true
    type: categorical
    text_fr: Quel flux concret cet acteur rend-il possible ?
    answer_options: [goods, energy, data, finance, service, software, certification, transport, insurance, unknown]
    targets:
      patterns:
        - id: critical_flow_dependency
          weight: 1.0

  - id: substitution_real_test_proof
    block_id: substitution
    order: 50
    required: true
    type: free_text
    text_fr: Quelle preuve confirme que l’alternative a été testée en conditions réelles ?
    intent_fr: Distinguer une alternative théorique d’une alternative activable.
    targets:
      dimensions:
        - id: substitution_weakness_score
          weight: 1.0
        - id: evidence_quality_score
          weight: 0.8
      patterns:
        - id: substitution_capacity_overestimated
          weight: 1.0

  - id: hidden_tier2_visibility
    block_id: hidden_dependencies
    order: 60
    required: true
    type: categorical
    text_fr: Avez-vous une visibilité documentée sur les fournisseurs ou dépendances de rang 2 de cet acteur ?
    answer_options: [yes, partial, no, unknown, not_applicable]
    targets:
      dimensions:
        - id: hidden_dependency_score
          weight: 1.0
        - id: evidence_quality_score
          weight: 0.5
      patterns:
        - id: hidden_second_tier_dependency
          weight: 1.0

  - id: gatekeepers_identification
    block_id: control_and_nuisance_actors
    order: 70
    required: true
    type: free_text
    text_fr: Quels acteurs peuvent bloquer, ralentir, assurer, financer, autoriser, taxer ou rendre ce flux trop coûteux ?
    targets:
      dimensions:
        - id: gatekeeper_pressure_score
          weight: 1.0
      patterns:
        - id: logistics_or_insurance_gatekeeper
          weight: 0.8

  - id: time_to_operational_impact
    block_id: time_to_impact
    order: 80
    required: true
    type: ordinal_scale
    text_fr: Combien de temps l’entreprise peut-elle tenir sans ce flux avant impact opérationnel significatif ?
    scale:
      min: 0
      max: 5
      labels_fr:
        0: plus de 6 mois
        1: 3 à 6 mois
        2: 1 à 3 mois
        3: 2 à 4 semaines
        4: moins de 2 semaines
        5: impact immédiat
    targets:
      dimensions:
        - id: time_to_impact_score
          weight: 1.0

  - id: decision_thresholds_defined
    block_id: decision_thresholds
    order: 90
    required: true
    type: categorical
    text_fr: Des seuils explicites existent-ils pour passer de surveillance à préparation, action ou escalade ?
    answer_options: [yes, partial, no, unknown]
    targets:
      dimensions:
        - id: decision_readiness_score
          weight: 1.0
      patterns:
        - id: decision_threshold_absence
          weight: 1.0
