# Docker-only tooling for app-geo. The `tools` service is the ONLY way to run
# project commands (npm, builds, tests, agent-browser). Nothing on the host.
#
#   docker compose -f docker/docker-compose.yml build tools
#   docker compose -f docker/docker-compose.yml run --rm tools npm install
#   docker compose -f docker/docker-compose.yml run --rm tools npm run test
#
# UID/GID default to 1000; override for other hosts via docker/.env (see .env.example).
name: app-geo

services:
  tools:
    build:
      context: ..
      dockerfile: docker/tools.Dockerfile
    image: app-geo-tools:local
    # Run as the host user so files written into the mounted repo stay owned by you.
    user: '${UID:-1000}:${GID:-1000}'
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      # Build-time Atlas ↔ Chokepoints Read API (read scope). Token via docker/.env; empty = graceful
      # build (Atlas omits the chokepoints section). The token is NEVER shipped to the client.
      CHOKEPOINTS_API_URL: ${CHOKEPOINTS_API_URL:-https://srv1305127.tail880531.ts.net/api}
      CHOKEPOINTS_API_TOKEN: ${CHOKEPOINTS_API_TOKEN:-}
    ports:
      - '127.0.0.1:5173:5173' # apps/cockpit dev server (Vite) — Phase 2
      - '127.0.0.1:4321:4321' # apps/public dev server (Astro) — Phase 3
    # Sensible default so `run --rm tools` with no args drops into a shell.
    command: ['bash']

  # Production cockpit server (built SPA + editable /api). Published on the host loopback only;
  # Tailscale serve fronts it as tailnet-only HTTPS (ADR 0005 / 0009). Never bind to 0.0.0.0 on host.
  cockpit:
    build:
      context: ..
      dockerfile: docker/tools.Dockerfile
    image: app-geo-tools:local
    user: '${UID:-1000}:${GID:-1000}'
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      HOST: '0.0.0.0' # inside the isolated container; host only publishes on 127.0.0.1
      PORT: '8787'
      # Internal chokepoints exploration: read_tainted scope (include_tainted). Tailnet-only surface —
      # restricted records are NEVER published to the public site (ADR 0013).
      CHOKEPOINTS_API_URL: ${CHOKEPOINTS_API_URL:-https://srv1305127.tail880531.ts.net/api}
      CHOKEPOINTS_API_TOKEN: ${CHOKEPOINTS_API_TOKEN_TAINTED:-}
      CHOKEPOINTS_INCLUDE_TAINTED: 'true'
    ports:
      - '127.0.0.1:8787:8787'
    restart: unless-stopped
    command: ['npm', '--workspace', '@ag/cockpit', 'start']

  # Public site www.applied-geopolitics.com — Caddy serves the static Astro build with automatic
  # HTTPS (Let's Encrypt). Ports bind the PUBLIC IP only (not 0.0.0.0) so they never collide with the
  # cockpit's `tailscale serve` on the Tailscale interface (ADR 0010). Cert provisions once DNS points
  # at PUBLIC_IP. Build the site first: npm --workspace @ag/public run build.
  public:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - lead # Caddy reverse_proxies /api/* to the lead service; start it first
      - hdde # Caddy fronts hdde.applied-geopolitics.com → hdde service (ADR 0033)
    ports:
      - '${PUBLIC_IP:-72.61.101.1}:80:80'
      - '${PUBLIC_IP:-72.61.101.1}:443:443'
      - '${PUBLIC_IP:-72.61.101.1}:443:443/udp'
    volumes:
      - ../apps/public/dist:/srv:ro
      - ../apps/hdde-web/dist:/srv-hdde:ro # built HDDE SPA (build first: npm --workspace @ag/hdde-web run build)
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # Self-hosted lead endpoint (POST /api/lead). Public only via Caddy reverse_proxy (no host port).
  # Writes leads into the cockpit acquisition pipeline (apps/cockpit/data/contacts.json). Set SMTP_*
  # to enable email notifications (ADR 0006 / 0011).
  lead:
    build:
      context: ..
      dockerfile: docker/tools.Dockerfile
    image: app-geo-tools:local
    user: '${UID:-1000}:${GID:-1000}'
    working_dir: /workspace
    volumes:
      - ..:/workspace
    environment:
      HOST: '0.0.0.0'
      PORT: '8080'
      # SMTP_HOST: smtp.example.com   # uncomment + set to enable email notifications
      # SMTP_PORT: '587'
      # SMTP_USER: ''
      # SMTP_PASS: ''
      # LEAD_TO: contact@applied-geopolitics.com
    restart: unless-stopped
    command: ['npm', '--workspace', '@ag/lead-api', 'start']

  # Hidden Dependency Discovery Engine API (ADR 0032/0033). Public ONLY via Caddy at
  # hdde.applied-geopolitics.com, behind auth. Binds the host loopback; Caddy reverse_proxies /api/*.
  # Seed the first account once running:
  #   docker compose -f docker/docker-compose.yml run --rm tools \
  #     npm --workspace @ag/hdde-api run seed:user -- you@example.com "a-long-password" owner_admin
  hdde:
    build:
      context: ..
      dockerfile: docker/tools.Dockerfile
    image: app-geo-tools:local
    user: '${UID:-1000}:${GID:-1000}'
    working_dir: /workspace
    volumes:
      - ..:/workspace # SQLite + exports persist under apps/hdde-api/data (git-ignored)
    environment:
      HOST: '0.0.0.0' # inside the isolated container; Caddy reaches it by service name
      PORT: '8090'
      APP_ENV: production
      HDDE_DB_PATH: /workspace/apps/hdde-api/data/hdde.sqlite
      HDDE_EXPORTS_DIR: /workspace/apps/hdde-api/data/exports
      SESSION_SECRET: ${HDDE_SESSION_SECRET:-change-me-to-a-long-random-string}
      ALLOW_SIGNUP: 'false'
      COOKIE_SECURE: 'true' # served over HTTPS by Caddy
      # OpenAI red team (ADR 0034). Set the key in docker/.env to enable; empty → offline facade.
      LLM_ENABLED: ${HDDE_LLM_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      # Chokepoints Read API — READ SCOPE ONLY, never read_tainted (ADR 0035). Feeds interview + red team.
      CHOKEPOINTS_API_URL: ${CHOKEPOINTS_API_URL:-https://srv1305127.tail880531.ts.net/api}
      CHOKEPOINTS_API_TOKEN: ${CHOKEPOINTS_API_TOKEN:-}
    ports:
      - '127.0.0.1:8090:8090'
    restart: unless-stopped
    command: ['npm', '--workspace', '@ag/hdde-api', 'start']

volumes:
  caddy_data:
  caddy_config:
